; =============================================================================
; Nissan Z (RZ34) — VR30DDTT 3.0L Twin-Turbo V6
; Turbos : Garrett MGT14446LKSZ (×2, parallel, one per bank)
; BOV    : NONE — recirculation valve only (EcuTek confirmed)
; WG     : ELECTRONIC — ECU position-controlled, not pneumatic duty-cycle
;
; Format : turbo-boost-gauge v1
; Spec   : specs/vehicle-systems/turbo-boost-gauge.bgl.md
; Sources: STILLEN VR30 turbo analysis, EcuTek boost control docs,
;          real-world owner driving validation (2023 Nissan Z)
; =============================================================================

[META]
NAME        = Nissan Z (RZ34) VR30DDTT
YEAR        = 2023
ENGINE      = 3.0L Twin-Turbo V6
TURBOS      = Garrett MGT14446LKSZ x2
BOV         = NONE
WASTEGATE   = ELECTRONIC


; Physical dial range — must match the instrument cluster face being rendered.
; The stock Nissan Z gauge runs -15 to +20 psi.
[GAUGE]
MIN_PSI = -15
MAX_PSI =  20


[RPM]
MAX        = 6800  ; redline
IDLE       = 800   ; idle RPM (needle rests here on startup)
DECEL_RATE = 2200  ; RPM/s drop rate when engine braking


; RPM thresholds that gate turbo spool.
; Below RPM_LOW: exhaust mass flow too low to spin turbine → rpmFactor = 0.
; Between RPM_LOW and RPM_FULL: rpmFactor ramps linearly 0→1.
; Above RPM_FULL: rpmFactor = 1 (clamped).
;
; Validated: "under 3K RPM it's very reserved" — NissanZClub owner.
[BOOST_THRESHOLD]
RPM_LOW  = 2500
RPM_FULL = 3500

; High-RPM taper: ECU partially opens wastegate above TAPER_START_RPM.
; Rationale: Garrett MGT14446LKSZ is at the edge of its efficiency island
; above 5K RPM. Holding boost adds heat without power. (STILLEN analysis)
; Boost reduces linearly from 1.0 at TAPER_START_RPM to (1 - TAPER_AMOUNT)
; at MAX RPM. Set TAPER_AMOUNT = 0 to disable.
TAPER_START_RPM = 5000
TAPER_AMOUNT    = 0.35


; All pressures in psi gauge (0 = atmospheric, positive = boost, negative = vacuum).
[PRESSURE]
TARGET_PSI       = 15.0  ; wastegate regulation target (stock tune peak)
VACUUM_PSI       = -10.0 ; idle manifold vacuum; needle rests here at startup
MAX_OVERSHOOT_PSI = 2.2  ; spike magnitude above TARGET_PSI on hard cold spool


; Time constants (τ) for the first-order RC filter that governs needle movement.
; Formula each frame: nextBoost = current + ((target - current) / τ) × dt
; Smaller τ = faster response. Larger τ = more sluggish.
[SPOOL]

; BASE_TAU: spool time constant at MAXIMUM exhaust energy (WOT + RPM_FULL+).
; Effective τ scales up at partial load: effectiveTau = BASE_TAU / sqrt(exhaustEnergy)
; Example: at 75% throttle (exhaustE ≈ 0.286), effectiveTau ≈ 0.84s instead of 0.45s.
BASE_TAU = 0.45

; WASTEGATE_SETTLE_TAU: exponential decay rate of the overshoot spike.
; At 5× this value (1.25s), <1% of the spike remains.
; Electronic wastegate responds quickly → short settle time vs pneumatic.
WASTEGATE_SETTLE_TAU = 0.25

; DROP_TAU: pressure drop time constant when throttle is released.
; No BOV on this car — pressure vents via recirculation valve + throttle body.
; Drop is still fast because intake pressure equalizes once throttle closes.
; Note: no atmospheric "pssh" sound — air is routed back to compressor inlet.
DROP_TAU = 0.12

; MIN_THROTTLE: TPS fraction below which no boost can build, regardless of RPM.
; This is ECU behavior, not just turbine physics. The electronic wastegate is
; commanded OPEN below ~65% TPS to prevent boost at part-throttle.
; This produces smooth, linear feel at cruise and sudden surge above the threshold.
; Validated: real Z owner — "I need about 75% throttle before anything happens."
MIN_THROTTLE = 0.65
