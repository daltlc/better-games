; =============================================================================
; Subaru WRX STI (GR/GV) — EJ257 2.5L Turbocharged Flat-4
; Turbo  : Mitsubishi TD05H-16G6 (single, top-mount intercooler)
; BOV    : ATMOSPHERIC — vents to air, produces the characteristic "pssh"
; WG     : PNEUMATIC — duty-cycle solenoid, not position-controlled
;
; Format : turbo-boost-gauge v1
; Spec   : specs/vehicle-systems/turbo-boost-gauge.bgl.md
; Sources: STI factory service manual, community dyno logs, forum owner reports
; =============================================================================

[META]
NAME      = Subaru WRX STI (GR/GV) EJ257
YEAR      = 2008-2014
ENGINE    = 2.5L Turbocharged Flat-4 (EJ257)
TURBOS    = Mitsubishi TD05H-16G6 x1
BOV       = ATMOSPHERIC
WASTEGATE = PNEUMATIC


; Stock STI gauges typically read -15 to +25 psi.
[GAUGE]
MIN_PSI = -15
MAX_PSI =  25


[RPM]
MAX        = 7200  ; STI redline (fuel cut at 7,200 rpm)
IDLE       = 900   ; slightly higher idle than the Z (flat-4 characteristic)
DECEL_RATE = 1800  ; milder engine braking feel than the twin-turbo V6


; Single large turbo requires more exhaust energy to spool than twin small turbos.
; The TD05H-16G6 has more rotational inertia — RPM_FULL is higher as a result.
[BOOST_THRESHOLD]
RPM_LOW  = 2500
RPM_FULL = 4500

; STI holds boost through redline on the stock tune — minimal taper.
; Pneumatic wastegate doesn't have the fine RPM-based shaping the VR30 ECU does.
TAPER_START_RPM = 6800
TAPER_AMOUNT    = 0.10


[PRESSURE]
TARGET_PSI        = 14.7  ; factory boost ~14.7 psi (1.0 bar gauge)
VACUUM_PSI        = -9.0  ; flat-4 pulls slightly less vacuum at idle than V6
MAX_OVERSHOOT_PSI = 3.5   ; bigger spike — single large turbo builds more momentum
                           ; before the pneumatic wastegate cracks open


[SPOOL]

; More lag than twin-turbo setup. Single turbo has higher rotational inertia.
; At WOT from idle, the STI feels "lazy" for 0.5-1s before boost arrives,
; then hits hard. Contrast with the Z's twin setup which spools much faster.
BASE_TAU = 0.85

; Pneumatic wastegate settles slower than electronic — spring + solenoid response.
WASTEGATE_SETTLE_TAU = 0.35

; Atmospheric BOV dumps to air instantly on throttle lift — fastest possible drop.
; This is what makes the "pssh" sound: compressed air releasing to atmosphere.
; Compare to the Z's 0.12s (recirculation) — both fast, but BOV is marginally quicker.
DROP_TAU = 0.06

; Pneumatic wastegate has no ECU-commanded TPS suppression.
; Boost starts building from ~40% throttle — more responsive to light inputs
; than the VR30DDTT, which the ECU holds back below 65% TPS.
MIN_THROTTLE = 0.40
